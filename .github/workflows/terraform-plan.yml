name: Terraform Plan

"on":
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  terraform-plan:
    name: Terraform plan
    runs-on: ubuntu-latest

    env:
      TF_WORKING_DIR: infra/terraform/environments/dev
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      AWS_REGION: ${{ vars.AWS_REGION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required GitHub variables
        run: |
          if [ -z "$AWS_ROLE_ARN" ]; then
            echo "Missing GitHub repository variable: AWS_ROLE_ARN"
            echo "Create it after the GitHub OIDC role has been manually provisioned."
            exit 1
          fi

          if [ -z "$AWS_REGION" ]; then
            echo "Missing GitHub repository variable: AWS_REGION"
            echo "Example value: us-east-1"
            exit 1
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform format check
        run: terraform fmt -check -recursive infra/terraform

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -input=false

      # Phase 4 intentionally stops at plan. Do not add terraform apply here
      # until a later deployment phase explicitly approves AWS resource changes.
