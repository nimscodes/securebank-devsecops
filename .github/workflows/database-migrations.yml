name: Run Database Migrations

"on":
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type run-migrations to run Prisma migrate deploy as a one-off ECS task.
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  prisma-migrate:
    name: Prisma migrate deploy
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      ECS_CLUSTER_NAME: ${{ vars.ECS_CLUSTER_NAME || 'securebank-dev-cluster' }}
      API_SERVICE_NAME: ${{ vars.API_SERVICE_NAME || 'securebank-dev-api' }}

    steps:
      - name: Check manual confirmation
        run: |
          if [ "${{ inputs.confirmation }}" != "run-migrations" ]; then
            echo "Refusing to run migrations. Re-run with confirmation set to: run-migrations"
            exit 1
          fi

      - name: Check required GitHub variables
        run: |
          if [ -z "$AWS_REGION" ]; then
            echo "Missing GitHub repository variable: AWS_REGION"
            exit 1
          fi

          if [ -z "$AWS_ROLE_ARN" ]; then
            echo "Missing GitHub repository variable: AWS_ROLE_ARN"
            exit 1
          fi

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve ECS service settings
        run: |
          TASK_DEFINITION="$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER_NAME" \
            --services "$API_SERVICE_NAME" \
            --query 'services[0].taskDefinition' \
            --output text)"

          aws ecs describe-services \
            --cluster "$ECS_CLUSTER_NAME" \
            --services "$API_SERVICE_NAME" \
            --query 'services[0].networkConfiguration' \
            --output json > network-configuration.json

          echo "TASK_DEFINITION=$TASK_DEFINITION" >> "$GITHUB_ENV"

      - name: Create migration task override
        run: |
          cat > migration-overrides.json <<'JSON'
          {
            "containerOverrides": [
              {
                "name": "api",
                "command": [
                  "sh",
                  "-c",
                  "export ENCODED_DB_PASSWORD=$(node -p \"encodeURIComponent(process.env.DB_PASSWORD)\") && export DATABASE_URL=\"postgresql://${DB_USER}:${ENCODED_DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}?schema=public\" && npx prisma migrate deploy"
                ]
              }
            ]
          }
          JSON

      - name: Run one-off ECS migration task
        run: |
          TASK_ARN="$(aws ecs run-task \
            --cluster "$ECS_CLUSTER_NAME" \
            --launch-type FARGATE \
            --task-definition "$TASK_DEFINITION" \
            --network-configuration file://network-configuration.json \
            --overrides file://migration-overrides.json \
            --query 'tasks[0].taskArn' \
            --output text)"

          if [ -z "$TASK_ARN" ] || [ "$TASK_ARN" = "None" ]; then
            echo "Failed to start migration task."
            exit 1
          fi

          echo "Migration task: $TASK_ARN"
          echo "TASK_ARN=$TASK_ARN" >> "$GITHUB_ENV"

      - name: Wait for migration task
        run: |
          aws ecs wait tasks-stopped \
            --cluster "$ECS_CLUSTER_NAME" \
            --tasks "$TASK_ARN"

      - name: Verify migration exit code
        run: |
          EXIT_CODE="$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER_NAME" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[?name==`api`].exitCode | [0]' \
            --output text)"

          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration task failed with exit code: $EXIT_CODE"
            exit 1
          fi

          echo "Migration task completed successfully."
