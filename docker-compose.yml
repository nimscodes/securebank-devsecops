services:
  postgres:
    image: postgres:16-alpine
    container_name: securebank-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: securebank
      POSTGRES_PASSWORD: securebank_password
      POSTGRES_DB: securebank
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U securebank -d securebank"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: securebank-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@securebank.dev
      PGADMIN_DEFAULT_PASSWORD: securebank_admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: securebank-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://securebank:securebank_password@postgres:5432/securebank?schema=public
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: securebank-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_INTERNAL_URL: http://api:4000
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
